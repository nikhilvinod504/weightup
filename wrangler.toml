name = "weightup-api"
main = "worker/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# KV namespace — after running `wrangler kv:namespace create WEIGHTUP_KV`
# paste the returned id below
[[kv_namespaces]]
binding = "WEIGHTUP_KV"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# SESSION_SECRET is set via Cloudflare dashboard or:
#   wrangler secret put SESSION_SECRET
# Do NOT put the actual secret value in this file.

[vars]
ENVIRONMENT = "production"
